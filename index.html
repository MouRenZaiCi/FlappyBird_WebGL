<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | FlyBird</title>
  <link rel="icon" href="TemplateData/icon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #231F20; 
    }

    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      /* 关键：保持比例缩放，不拉伸，不露馅 */
      object-fit: contain; 
      background: #231F20;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="360" height="640" tabindex="-1"></canvas>
  </div>

  <script src="Build/FlyBird.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");

    createUnityInstance(canvas, {
      arguments: [],
      dataUrl: "Build/FlyBird.data",
      frameworkUrl: "Build/FlyBird.framework.js",
      codeUrl: "Build/FlyBird.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "SomeWhere",
      productName: "FlyBird",
      productVersion: "1.0",
      matchWebGLToCanvasSize: false, 
    }).then((unityInstance) => {
      function updateInternalResolution() {
        canvas.width = 360;
        canvas.height = 640;
      }

      window.addEventListener('resize', updateInternalResolution);
      updateInternalResolution();
    }).catch((message) => {
      alert(message);
    });
  </script>
</body>

</html>
